<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Estudiantil - Informatica IMA</title>

    <link rel="icon" type="image/png" href="IMA-Logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=11">
</head>
<body class="bg-light">

    <div id="main-nav-container"></div>

    <main class="py-5">
        <div class="container animate-fade-in-up">
            <div class="row align-items-center mb-5 text-center text-md-start">
                <div class="col-md-8">
                    <h1 class="fw-bold">Panel de Control</h1>
                    <p class="text-muted">Bienvenido de nuevo, <span id="student-name" class="text-primary fw-bold">Alumno</span></p>
                </div>
                <div class="col-md-4 text-md-end">
                    <button class="btn btn-outline-primary pwa-install-action d-none rounded-pill px-4">
                        <i class="fas fa-mobile-alt me-2"></i> Instalar App
                    </button>
                </div>
            </div>

            <!-- Stats Overview -->
            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="card-ima p-4 border-start border-primary border-4">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 rounded-circle p-3 me-3 text-primary">
                                <i class="fas fa-tasks fs-4"></i>
                            </div>
                            <div>
                                <h3 class="fw-bold mb-0" id="pending-tasks-count">-</h3>
                                <p class="small text-muted mb-0">Tareas Pendientes</p>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- More stats can be added here -->
            </div>

            <h4 class="fw-bold mb-4"><i class="fas fa-book-open text-primary me-2"></i> Mis Actividades</h4>

            <div class="row" id="tasks-list">
                <!-- Activities rendered by js/student.js -->
            </div>
        </div>
    </main>

    <!-- Submission Modal -->
    <div class="modal fade" id="submission-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-bottom-0 p-4">
                    <h5 class="modal-title fw-bold" id="modal-task-title">Entregar Tarea</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 pt-0">
                    <form id="submission-form">
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Cargar Archivos</label>
                            <input type="file" id="file-input" class="form-control bg-light" multiple>
                            <div class="form-text small">Puedes subir imágenes, PDFs o documentos (máx. 10MB).</div>
                        </div>

                        <!-- File Preview -->
                        <div id="file-preview-container" class="hidden mb-4">
                            <div id="image-preview" class="mb-2 hidden">
                                <img src="" alt="Preview" class="img-fluid rounded border shadow-sm mx-auto d-block" style="max-height: 200px;">
                            </div>
                            <div id="file-info-preview" class="p-3 bg-light rounded text-center small hidden"></div>
                            <button type="button" id="accept-file-btn" class="btn btn-primary w-100 mt-2 rounded-pill">
                                <i class="fas fa-plus me-1"></i> Añadir a la lista
                            </button>
                        </div>

                        <!-- Uploaded List -->
                        <div id="uploaded-files-container" class="hidden mb-4">
                            <h6 class="small fw-bold mb-2">Archivos listos para enviar:</h6>
                            <ul id="uploaded-files-list" class="list-group"></ul>
                        </div>

                        <button type="submit" id="confirm-submission-btn" class="btn btn-ima-primary w-100 py-3 shadow" disabled>
                            <i class="fas fa-paper-plane me-2"></i> Finalizar Entrega
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="main-footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ui-common.js?v=11"></script>
    <script src="js/data.js?v=11"></script>
    <script src="js/config.js?v=11"></script>
    <script src="js/api.js?v=11"></script>
    <script src="js/student.js?v=11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.renderCommonNav();
            window.renderCommonFooter();
            window.setupCommonUI();
        });
    </script>
</body>
</html>
