<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Evaluación - Área de Informática</title>
    <link rel="icon" type="image/png" href="IMA-Logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <!-- CDNs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=11">
</head>
<body class="bg-light">

    <header id="main-header" class="fixed-top shadow-sm">
        <div class="container py-2">
            <div class="d-flex justify-content-between align-items-center">
                <a href="index.html" class="logo-container d-flex align-items-center gap-3 text-decoration-none">
                    <img src="imagenes/logo.png" alt="Logo" width="90" class="logo-img">
                    <div class="d-none d-sm-block">
                        <span class="d-block fw-bold text-primary mb-0" style="font-size: 1rem; font-family: 'Poppins';">INSTITUTO MARIA AUXILIADORA</span>
                        <span class="text-secondary fw-medium" style="font-size: 0.75rem; letter-spacing: 1px;">ÁREA DE INFORMÁTICA</span>
                    </div>
                </a>
            </div>
        </div>
    </header>

    <main class="py-5" style="margin-top: 85px;">
        <div class="container max-width-container" style="max-width: 900px;">
            <div class="card-ima p-4 p-md-5 text-center mb-5">
                <h1 class="display-6 fw-bold text-dark mb-4" style="font-family: 'Poppins';">Resumen de Evaluación</h1>

                <div id="results-container" class="py-5">
                    <div class="d-flex flex-column align-items-center">
                        <div class="spinner-border text-primary mb-3" role="status"></div>
                        <p class="text-muted fw-medium">Procesando tus resultados...</p>
                    </div>
                </div>

                <div class="mt-5 pt-4 border-top">
                    <a href="student-dashboard.html" class="btn btn-ima-primary px-5 py-3 rounded-3 shadow-sm">
                        <i class="fa-solid fa-house me-2"></i> VOLVER AL DASHBOARD
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 mt-auto">
        <div class="container text-center">
            <p class="text-white-50 mb-0 small">Área de Informática &copy; <span id="current-year"></span> Instituto María Auxiliadora</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js?v=11"></script>
    <script src="js/config.js?v=11"></script>
    <script src="js/ui-common.js?v=11"></script>
    <script src="js/results.js?v=11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.setupCommonUI) window.setupCommonUI();
        });
    </script>
</body>
</html>
