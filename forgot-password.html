<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Area de Informatica</title>
    <link rel="icon" type="image/png" href="IMA-Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=18">
</head>
<body class="font-inter antialiased text-gray-900 bg-gray-50 min-h-screen flex flex-col">
    <header id="main-header" class="bg-white shadow-md py-2 px-3 fixed w-full z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-4">
                <img src="imagenes/logo.png" alt="Logo" width="120" class="logo-img">
                <span class="text-2xl font-bold text-blue-800 hidden sm:inline">Area de Informatica</span>
            </a>
            <nav class="hidden md:flex space-x-6">
                <a href="index.html" class="text-gray-700 hover:text-blue-600 font-medium">Inicio</a>
                <a href="login.html" class="text-gray-700 hover:text-blue-600 font-medium">Portal</a>
            </nav>
        </div>
    </header>

    <main class="mt-[6rem] flex-grow flex items-center justify-center px-4">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl w-full max-w-sm border border-gray-100">
            <h2 class="text-3xl font-extrabold mb-4 text-center text-gray-800">Recuperar Contraseña</h2>
            <p class="text-gray-600 text-center mb-8 text-sm">Ingresa tu correo electrónico para recibir un enlace de recuperación.</p>

            <form id="recovery-form" class="space-y-6">
                <div>
                    <label for="email" class="block font-bold text-gray-700 mb-2">Correo Electrónico</label>
                    <input type="email" id="email" class="w-full p-4 border rounded-2xl focus:ring-2 focus:ring-blue-400 focus:outline-none transition-all" placeholder="tu@email.com" required>
                </div>
                <button type="submit" id="recovery-submit-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 shadow-lg transition-all">
                    Enviar Enlace
                </button>
            </form>

            <div id="recovery-message" class="hidden mt-6 p-4 rounded-2xl text-center text-sm font-medium"></div>

            <p class="text-center mt-8 text-gray-600">
                <a href="login.html" class="text-blue-600 font-bold hover:underline">Volver al Inicio de Sesión</a>
            </p>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-4 mt-auto">
        <div class="container mx-auto px-5 text-center text-sm">
            &copy; 2026 Instituto Maria Auxiliadora
        </div>
    </footer>

    <script src="js/config.js?v=18"></script>
    <script src="js/api.js?v=18"></script>
    <script>
        document.getElementById('recovery-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('recovery-submit-btn');
            const msg = document.getElementById('recovery-message');
            const email = document.getElementById('email').value;

            btn.disabled = true;
            btn.innerHTML = 'Enviando...';
            msg.classList.add('hidden');

            try {
                const res = await fetchApi('USER', 'requestPasswordRecovery', { email });
                msg.classList.remove('hidden');
                if (res.status === 'success') {
                    msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-green-100 text-green-700';
                    msg.textContent = 'Si el correo existe, recibirás un enlace en unos momentos.';
                    e.target.reset();
                } else {
                    msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-red-100 text-red-700';
                    msg.textContent = res.message;
                }
            } catch (err) {
                msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-red-100 text-red-700';
                msg.textContent = 'Error de conexión.';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Enviar Enlace';
            }
        });
    </script>
</body>
</html>
