<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Area de Informatica</title>
    <link rel="icon" type="image/png" href="IMA-Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=19">
</head>
<body class="font-inter antialiased text-gray-900 bg-gray-50 min-h-screen flex flex-col">
    <header id="main-header" class="fixed w-full z-50 transition-all duration-300">
        <div class="container mx-auto px-4 md:px-6 flex justify-between items-center py-2 md:py-3">
            <div class="flex items-center gap-3">
                <a href="index.html" class="flex items-center gap-3 group">
                    <img src="imagenes/logo.png" alt="Logo" width="45" height="auto" class="logo-img transition-transform duration-300 group-hover:scale-105">
                    <div class="text-left leading-tight">
                        <h1 class="text-sm md:text-base font-black text-gray-900 uppercase">ISEMED</h1>
                        <p class="text-[10px] md:text-xs font-bold text-blue-600 uppercase tracking-tighter">Área de Informática I</p>
                    </div>
                </a>
            </div>
            <nav class="hidden lg:flex items-center gap-1">
                <a href="index.html" class="px-3 py-2 text-[10px] font-bold text-gray-600 hover:text-blue-600 rounded-lg transition-colors uppercase tracking-widest">Inicio</a>
                <a href="login.html" class="px-3 py-2 text-[10px] font-black text-gray-600 hover:text-blue-600 rounded-lg transition-colors uppercase tracking-widest">Portal</a>
            </nav>
        </div>
    </header>

    <main class="mt-[4rem] flex-grow flex items-center justify-center py-12 px-4">
        <div class="card-ima p-8 md:p-10 w-full max-w-sm">
            <h2 class="text-xl font-black mb-4 text-center text-gray-900 uppercase tracking-tighter">Recuperar Clave</h2>
            <p class="text-gray-400 text-center mb-8 text-[11px] font-medium uppercase tracking-widest">Solicita un enlace de acceso.</p>

            <form id="recovery-form" class="space-y-6">
                <div>
                    <label for="email" class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Correo Electrónico</label>
                    <input type="email" id="email" class="w-full px-4 py-3 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:outline-none transition-all text-sm font-medium" placeholder="tu@email.com" required>
                </div>
                <button type="submit" id="recovery-submit-btn" class="btn-ima-primary w-full py-3">
                    Enviar Enlace
                </button>
            </form>

            <div id="recovery-message" class="hidden mt-6 p-4 rounded-xl text-center text-[10px] font-black uppercase tracking-widest"></div>

            <p class="text-center mt-8 text-[11px] font-bold text-gray-400 uppercase tracking-tighter">
                <a href="login.html" class="text-blue-600 hover:underline">Volver al Inicio de Sesión</a>
            </p>
        </div>
    </main>

    <footer class="bg-white/50 py-6 mt-auto">
        <div class="container mx-auto px-6 text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">
                &copy; 2026 Área de Informática <strong>ISEMED</strong>.
            </p>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest opacity-60">
                <a href="#" class="hover:text-blue-600 transition-colors">Privacidad</a>
                <span class="mx-1">-</span>
                <a href="#" class="hover:text-blue-600 transition-colors">Términos y Condiciones</a>
                <span class="mx-1">-</span>
                <a href="#" class="hover:text-blue-600 transition-colors">Contáctanos</a>
            </p>
        </div>
    </footer>

    <script src="js/config.js?v=19"></script>
    <script src="js/api.js?v=19"></script>
    <script>
        document.getElementById('recovery-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('recovery-submit-btn');
            const msg = document.getElementById('recovery-message');
            const email = document.getElementById('email').value;

            btn.disabled = true;
            btn.innerHTML = 'Enviando...';
            msg.classList.add('hidden');

            try {
                const res = await fetchApi('USER', 'requestPasswordRecovery', { email });
                msg.classList.remove('hidden');
                if (res.status === 'success') {
                    msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-green-100 text-green-700';
                    msg.textContent = 'Si el correo existe, recibirás un enlace en unos momentos.';
                    e.target.reset();
                } else {
                    msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-red-100 text-red-700';
                    msg.textContent = res.message;
                }
            } catch (err) {
                msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-red-100 text-red-700';
                msg.textContent = 'Error de conexión.';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Enviar Enlace';
            }
        });
    </script>
</body>
</html>
