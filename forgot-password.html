<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Area de Informatica</title>
    <link rel="icon" type="image/png" href="IMA-Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=21">
</head>
<body class="font-inter antialiased text-gray-900 min-h-screen flex flex-col bg-gray-50">

    <header id="main-header" class="bg-white shadow-sm py-2 px-3 fixed w-full z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-4">
                <img src="imagenes/logo.png" alt="Logo" width="100" height="auto" class="logo-img">
                <span class="text-xl font-bold text-blue-800 hidden sm:inline">Area de Informatica</span>
            </a>
            <a href="login.html" class="text-blue-600 hover:text-blue-800 font-semibold">Volver al Login</a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl border border-gray-100">
            <div id="request-section">
                <h2 class="text-3xl font-extrabold text-gray-800 mb-2">Recuperar Contraseña</h2>
                <p class="text-gray-600 mb-8">Ingresa tu correo electrónico para recibir un enlace de recuperación.</p>

                <form id="request-form" class="space-y-6">
                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Correo Electrónico</label>
                        <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none" placeholder="tu@correo.com">
                    </div>
                    <button type="submit" id="request-submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all transform hover:-translate-y-1 shadow-lg flex justify-center items-center">
                        <span>Enviar Enlace</span>
                    </button>
                </form>
            </div>

            <div id="reset-section" class="hidden">
                <h2 class="text-3xl font-extrabold text-gray-800 mb-2">Nueva Contraseña</h2>
                <p class="text-gray-600 mb-8">Ingresa tu nueva contraseña para acceder a tu cuenta.</p>

                <form id="reset-form" class="space-y-6">
                    <div>
                        <label for="new-password" class="block text-sm font-semibold text-gray-700 mb-2">Nueva Contraseña</label>
                        <input type="password" id="new-password" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none" placeholder="••••••••">
                    </div>
                    <div>
                        <label for="confirm-password" class="block text-sm font-semibold text-gray-700 mb-2">Confirmar Contraseña</label>
                        <input type="password" id="confirm-password" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none" placeholder="••••••••">
                    </div>
                    <button type="submit" id="reset-submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all transform hover:-translate-y-1 shadow-lg flex justify-center items-center">
                        <span>Restablecer Contraseña</span>
                    </button>
                </form>
            </div>

            <div id="message-container" class="mt-6 hidden p-4 rounded-xl text-center font-medium"></div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-6">
        <div class="container mx-auto px-5 text-center">
            <p class="text-sm">&copy; 2026 Instituto Maria Auxiliadora - Area de Informatica</p>
        </div>
    </footer>

    <script src="js/ui-common.js?v=21"></script>
    <script src="js/data.js?v=21"></script>
    <script src="js/config.js?v=21"></script>
    <script src="js/api.js?v=21"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.setupCommonUI) window.setupCommonUI();
            if (window.renderCommonNav) window.renderCommonNav();

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const requestSection = document.getElementById('request-section');
            const resetSection = document.getElementById('reset-section');
            const messageContainer = document.getElementById('message-container');

            if (token) {
                requestSection.classList.add('hidden');
                resetSection.classList.remove('hidden');
            }

            function showMessage(msg, isError = false) {
                messageContainer.textContent = msg;
                messageContainer.className = `mt-6 p-4 rounded-xl text-center font-medium ${isError ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
                messageContainer.classList.remove('hidden');
            }

            document.getElementById('request-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const submitBtn = document.getElementById('request-submit');

                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50');

                try {
                    const response = await window.fetchApi('USER', 'requestPasswordRecovery', { email });
                    if (response.status === 'success') {
                        showMessage(response.message);
                        if (response.debugLink) console.log("DEBUG Recovery Link:", response.debugLink);
                    } else {
                        showMessage(response.message, true);
                    }
                } catch (err) {
                    showMessage("Error de conexión con el servidor.", true);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-50');
                }
            });

            document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('new-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                const submitBtn = document.getElementById('reset-submit');

                if (newPassword !== confirmPassword) {
                    return showMessage("Las contraseñas no coinciden.", true);
                }

                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50');

                try {
                    const response = await window.fetchApi('USER', 'resetPassword', { token, newPassword });
                    if (response.status === 'success') {
                        showMessage(response.message);
                        setTimeout(() => window.location.href = 'login.html', 3000);
                    } else {
                        showMessage(response.message, true);
                    }
                } catch (err) {
                    showMessage("Error de conexión con el servidor.", true);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-50');
                }
            });
        });
    </script>
</body>
</html>
