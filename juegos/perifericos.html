<!-- Este archivo contiene solo la estructura HTML del juego de periféricos. -->
<!-- No incluye el encabezado, pie de página, ni estilos globales. -->

    <!-- REQ: Pantalla de Carga Profesional (Fase 3) -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/95 flex flex-col items-center justify-center transition-all duration-500 z-[9999] opacity-0 pointer-events-none">
        <div class="relative w-32 h-32 mb-8">
            <div class="absolute inset-0 border-4 border-blue-50 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <img src="../imagenes/logo.png" alt="Logo" class="w-16 animate-pulse">
            </div>
        </div>
        <div class="text-center space-y-3">
            <h3 id="loading-msg" class="text-sm font-black text-gray-900 uppercase tracking-[0.3em]">Inicializando...</h3>
            <p id="loading-submsg" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest animate-pulse">Preparando entorno académico</p>
        </div>
        <div class="mt-12 w-48 h-1 bg-gray-100 rounded-full overflow-hidden">
            <div id="loading-bar" class="h-full bg-blue-600 rounded-2xl transition-all duration-1000" style="width: 0%"></div>
        </div>
    </div>
<h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-8 uppercase tracking-tighter">
    Periféricos
</h3>
<!-- Start Menu -->
<div id="start-menu" class="flex flex-col items-center justify-center min-h-[300px] animate-fade-in-down">
    <p class="text-xl text-gray-700 mb-2">Demuestra tus conocimientos sobre los tipos de periféricos.</p>
    <div id="personal-record-init" class="mb-6 bg-yellow-50 p-3 rounded-xl border border-yellow-200 hidden">
        <p class="text-sm font-bold text-yellow-800">Récord Personal: <span id="init-max-score">0</span> pts</p>
    </div>
    <button id="start-game-button" class="px-8 py-4 rounded-xl font-bold text-xl
                bg-blue-600 rounded-2xl text-white hover:bg-blue-700
                transition-all duration-300 ease-in-out
                shadow-lg hover:shadow-xl transform hover:-translate-y-1
                focus:outline-none focus:ring-4 focus:ring-blue-300">
        Comenzar Juego
    </button>
</div>

<!-- Game Play Area -->
<div id="game-play-area" class="hidden flex-col items-center animate-fade-in-down">
    <div class="w-full flex justify-between items-center mb-6">
        <span class="text-lg font-semibold text-gray-700">Tiempo: <span id="timer" class="text-blue-600">00:00</span></span>
        <span class="text-lg font-semibold text-gray-700">Puntaje: <span id="score-display" class="text-green-600">0</span></span>
    </div>

    <div id="peripheral-card" class="bg-white p-8 rounded-[2rem] border border-gray-100 shadow-xl shadow-md mb-8 w-full max-w-sm border-2 border-transparent transition-all duration-300">
        <img id="peripheral-image" src="" alt="Peripheral Image" class="w-48 h-48 object-contain mx-auto mb-4 hidden">
        <h3 id="peripheral-name" class="text-2xl font-bold text-gray-800 mb-4"></h3>
        <p id="peripheral-description" class="text-gray-600 text-sm"></p>
    </div>

    <div class="grid grid-cols-2 gap-4 md:grid-cols-2 w-full md:grid-cols-4 max-w-xl mb-6">
        <button class="answer-button transform hover:-translate-y-0.5 active:scale-95 transition-all shadow-lg shadow-gray-200 px-6 py-4 rounded-lg font-semibold text-base bg-blue-500 text-white hover:bg-blue-600 rounded-2xl transition-colors duration-200" data-type="entrada">Entrada</button>
        <button class="answer-button transform hover:-translate-y-0.5 active:scale-95 transition-all shadow-lg shadow-gray-200 px-6 py-4 rounded-lg font-semibold text-base bg-red-500 text-white hover:bg-red-600 transition-colors duration-200" data-type="salida">Salida</button>
        <button class="answer-button transform hover:-translate-y-0.5 active:scale-95 transition-all shadow-lg shadow-gray-200 px-6 py-4 rounded-lg font-semibold text-base bg-purple-500 text-white hover:bg-purple-600 transition-colors duration-200" data-type="ambos">Ambos</button>
        <button class="answer-button transform hover:-translate-y-0.5 active:scale-95 transition-all shadow-lg shadow-gray-200 px-6 py-4 rounded-lg font-semibold text-base bg-green-500 text-white hover:bg-green-600 transition-colors duration-200" data-type="almacenamiento">Almacenamiento</button>
    </div>

    <button id="end-game-button" class="px-6 py-3 rounded-xl font-semibold text-base
                bg-orange-600 text-white hover:bg-orange-700
                transition-all duration-300 ease-in-out
                shadow-md hover:shadow-lg focus:outline-none focus:ring-4 focus:ring-orange-300">
        Terminar Juego
    </button>
</div>

<!-- Result Screen -->
<div id="result-screen" class="hidden flex-col items-center justify-center min-h-[300px] animate-fade-in-down">
    <h2 class="text-3xl font-bold text-gray-900 mb-8 uppercase tracking-tighter">Resultados del Juego</h2>
    <p class="text-xl text-green-600 mb-2">Aciertos: <span id="correct-answers">0</span></p>
    <p class="text-xl text-red-600 mb-4">Errores: <span id="incorrect-answers">0</span></p>
    <p class="text-lg text-gray-700 mb-6">Tiempo Total: <span id="final-time">00:00</span></p>
    <div class="flex space-x-4 mt-6">
        <button id="retry-game-button" class="px-8 py-4 rounded-xl font-bold text-xl
                    bg-blue-600 rounded-2xl text-white hover:bg-blue-700
                    transition-all duration-300 ease-in-out
                    shadow-lg hover:shadow-xl transform hover:-translate-y-1
                    focus:outline-none focus:ring-4 focus:ring-blue-300">
            Reintentar
        </button>
        <button id="exit-game-button" class="px-8 py-4 rounded-xl font-bold text-xl
                    bg-gray-600 text-white hover:bg-gray-700
                    transition-all duration-300 ease-in-out
                    shadow-lg hover:shadow-xl transform hover:-translate-y-1
                    focus:outline-none focus:ring-4 focus:ring-gray-300">
            Salir
        </button>
    </div>
</div>
