<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Area de Informatica</title>
    <link rel="icon" type="image/png" href="IMA-Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=19">
</head>
<body class="font-inter antialiased text-gray-900 bg-gray-50 min-h-screen flex flex-col">
    <header id="main-header" class="bg-white shadow-md py-2 px-3 fixed w-full z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-4">
                <img src="imagenes/logo.png" alt="Logo" width="120" class="logo-img">
                <span class="text-2xl font-bold text-blue-800 hidden sm:inline">Area de Informatica</span>
            </a>
        </div>
    </header>

    <main class="mt-[6rem] flex-grow flex items-center justify-center px-4">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl w-full max-w-sm border border-gray-100">
            <h2 class="text-3xl font-extrabold mb-4 text-center text-gray-800">Nueva Contraseña</h2>
            <p class="text-gray-600 text-center mb-8 text-sm">Ingresa tu nueva clave de acceso.</p>

            <form id="reset-form" class="space-y-6">
                <div>
                    <label for="password" class="block font-bold text-gray-700 mb-2">Contraseña Nueva</label>
                    <input type="password" id="password" class="w-full p-4 border rounded-2xl focus:ring-2 focus:ring-blue-400 focus:outline-none transition-all" placeholder="••••••••" required minlength="6">
                </div>
                <div>
                    <label for="confirm-password" class="block font-bold text-gray-700 mb-2">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" class="w-full p-4 border rounded-2xl focus:ring-2 focus:ring-blue-400 focus:outline-none transition-all" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" id="reset-submit-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 shadow-lg transition-all">
                    Cambiar Contraseña
                </button>
            </form>

            <div id="reset-message" class="hidden mt-6 p-4 rounded-2xl text-center text-sm font-medium"></div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-4 mt-auto">
        <div class="container mx-auto px-5 text-center text-sm">
            &copy; 2026 Instituto Maria Auxiliadora
        </div>
    </footer>

    <script src="js/config.js?v=19"></script>
    <script src="js/api.js?v=19"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('reset-form').innerHTML = '<p class="text-red-500 text-center font-bold">Token de recuperación no encontrado o inválido.</p>';
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reset-submit-btn');
            const msg = document.getElementById('reset-message');
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (pass !== confirmPass) {
                msg.classList.remove('hidden');
                msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-red-100 text-red-700';
                msg.textContent = 'Las contraseñas no coinciden.';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Cambiando...';
            msg.classList.add('hidden');

            try {
                const res = await fetchApi('USER', 'resetPassword', { token, newPassword: pass });
                msg.classList.remove('hidden');
                if (res.status === 'success') {
                    msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-green-100 text-green-700';
                    msg.textContent = '¡Contraseña actualizada! Redirigiendo...';
                    setTimeout(() => window.location.href = 'login.html', 3000);
                } else {
                    msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-red-100 text-red-700';
                    msg.textContent = res.message;
                }
            } catch (err) {
                msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-red-100 text-red-700';
                msg.textContent = 'Error de conexión.';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Cambiar Contraseña';
            }
        });
    </script>
</body>
</html>
