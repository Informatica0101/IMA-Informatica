<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Area de Informatica</title>
    <link rel="icon" type="image/png" href="IMA-Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=21">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="font-inter antialiased text-gray-900 bg-gray-50 min-h-screen flex flex-col">
    <header id="main-header" class="fixed w-full z-50 transition-all duration-300 bg-white border-b border-gray-100">
        <div class="container mx-auto px-4 md:px-6 flex justify-between items-center h-16 md:h-20">
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center gap-3 group">
                    <img src="imagenes/logo.png" alt="Logo" class="logo-img transition-transform duration-300 group-hover:scale-105 w-[60px] md:w-[80px] h-auto">
                    <div class="header-title-container">
                        <h1 class="text-sm md:text-xl font-black text-gray-900 uppercase tracking-tighter leading-none">ISEMED</h1>
                        <p class="text-[9px] md:text-[11px] font-bold text-blue-600 uppercase tracking-widest mt-1">Área de Informática</p>
                    </div>
                </a>
            </div>

            <nav class="hidden md:flex items-center gap-1">
                <a href="index.html" class="nav-link-desktop">Inicio</a>
                <a href="login.html" id="nav-portal-link" class="nav-link-desktop">Portal</a>

                <div class="relative group">
                    <button class="nav-link-desktop flex items-center gap-1">
                        Cursos <i class="fas fa-chevron-down text-[8px] opacity-50 group-hover:rotate-180 transition-transform"></i>
                    </button>
                    <div class="absolute left-0 mt-0 w-56 bg-white rounded-xl shadow-2xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 translate-y-1 border border-gray-100 z-[110]">
                        <div id="desktop-courses-menu"></div>
                    </div>
                </div>

                <div class="relative group">
                    <button class="nav-link-desktop flex items-center gap-1">
                        Contenido <i class="fas fa-chevron-down text-[8px] opacity-50 group-hover:rotate-180 transition-transform"></i>
                    </button>
                    <div class="absolute left-0 mt-0 w-64 bg-white rounded-xl shadow-2xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 translate-y-1 border border-gray-100 z-[110]">
                        <div id="desktop-content-menu"></div>
                    </div>
                </div>

                <a href="#" onclick="handleHeaderAction('show-activities')" class="nav-link-desktop">Actividades</a>
                <a href="pseudocode.html" class="nav-link-desktop">Pseudocódigo</a>
                <button id="open-profile-btn" class="nav-link-desktop">Mi perfil</button>
            </nav>

            <div class="flex items-center gap-4">
                <img src="imagenes/bandera-de-honduras.png" alt="HN" class="w-8 md:w-[45px] h-auto opacity-100 block transition-transform hover:scale-110">
            </div>
        </div>
    </header>

    <main class="mt-[4rem] flex-grow flex items-center justify-center py-12 px-4">
        <div class="card-ima p-8 md:p-10 w-full max-w-sm">
            <h2 class="text-xl font-black mb-4 text-center text-gray-900 uppercase tracking-tighter">Nueva Contraseña</h2>
            <p class="text-gray-400 text-center mb-8 text-[11px] font-medium uppercase tracking-widest">Ingresa tu nueva clave.</p>

            <form id="reset-form" class="space-y-6">
                <div>
                    <label for="password" class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Contraseña Nueva</label>
                    <input type="password" id="password" class="w-full px-4 py-3 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:outline-none transition-all text-sm font-medium" placeholder="••••••••" required minlength="6">
                </div>
                <div>
                    <label for="confirm-password" class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" class="w-full px-4 py-3 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:outline-none transition-all text-sm font-medium" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" id="reset-submit-btn" class="btn-ima-primary w-full py-3">
                    Cambiar Contraseña
                </button>
            </form>

            <div id="reset-message" class="hidden mt-6 p-4 rounded-xl text-center text-[10px] font-black uppercase tracking-widest"></div>
        </div>
    </main>

    <!-- NAVEGACIÓN MÓVIL -->
    <div class="mobile-bottom-nav md:hidden z-[2000]">
        <a href="index.html" class="bottom-nav-item" title="Inicio">
            <i class="fas fa-home text-xl"></i>
        </a>
        <a href="login.html" id="mobile-portal-bottom-nav" class="bottom-nav-item active" title="Portal">
            <i class="fas fa-th-large text-xl"></i>
        </a>
        <button class="bottom-nav-item" onclick="window.openAcademicHierarchy('Presentaciones')" title="Cursos">
            <i class="fas fa-book-open text-xl"></i>
        </button>
        <button class="bottom-nav-item" onclick="window.showAcademicHierarchy('Contenido')" title="Contenido">
            <i class="fas fa-file-pdf text-xl"></i>
        </button>
        <a href="#" onclick="handleHeaderAction('show-activities')" class="bottom-nav-item" title="Actividades">
            <i class="fas fa-gamepad text-xl"></i>
        </a>
        <button id="mobile-profile-btn-nav" class="bottom-nav-item" title="Perfil">
            <i class="fas fa-user-circle text-xl"></i>
        </button>
    </div>

    <footer class="bg-white/50 py-6 mt-auto">
        <div class="container mx-auto px-6 text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">
                &copy; 2026 Área de Informática <strong>ISEMED</strong>.
            </p>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest opacity-60">
                <a href="#" class="hover:text-blue-600 transition-colors">Privacidad</a>
                <span class="mx-1">-</span>
                <a href="#" class="hover:text-blue-600 transition-colors">Términos y Condiciones</a>
                <span class="mx-1">-</span>
                <a href="#" class="hover:text-blue-600 transition-colors">Contáctanos</a>
            </p>
        </div>
    </footer>

    <script src="js/config.js?v=21"></script>
    <script src="js/api.js?v=21"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('reset-form').innerHTML = '<p class="text-red-500 text-center font-bold">Token de recuperación no encontrado o inválido.</p>';
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reset-submit-btn');
            const msg = document.getElementById('reset-message');
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (pass !== confirmPass) {
                msg.classList.remove('hidden');
                msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-red-100 text-red-700';
                msg.textContent = 'Las contraseñas no coinciden.';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Cambiando...';
            msg.classList.add('hidden');

            try {
                const res = await fetchApi('USER', 'resetPassword', { token, newPassword: pass });
                msg.classList.remove('hidden');
                if (res.status === 'success') {
                    msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-green-100 text-green-700';
                    msg.textContent = '¡Contraseña actualizada! Redirigiendo...';
                    setTimeout(() => window.location.href = 'login.html', 3000);
                } else {
                    msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-red-100 text-red-700';
                    msg.textContent = res.message;
                }
            } catch (err) {
                msg.className = 'mt-6 p-4 rounded-2xl text-center text-sm font-medium bg-red-100 text-red-700';
                msg.textContent = 'Error de conexión.';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Cambiar Contraseña';
            }
        });
    </script>
</body>
</html>
