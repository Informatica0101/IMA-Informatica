<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Estudiantil - Informatica IMA</title>

    <link rel="icon" type="image/png" href="IMA-Logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=11">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

    <div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="card-ima p-0 overflow-hidden" style="max-width: 600px; width: 100%;">
            <div class="p-4 bg-primary text-center text-white">
                <h4 class="fw-bold mb-0">Crea tu Cuenta</h4>
                <p class="small opacity-75 mb-0">Únete a nuestra comunidad educativa tecnológica</p>
            </div>

            <div class="p-4 p-md-5">
                <form id="register-form">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted">Nombre Completo</label>
                            <input type="text" id="nombre" class="form-control bg-light" placeholder="Ej. Juan Pérez" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted">Correo Electrónico</label>
                            <input type="email" id="email" class="form-control bg-light" placeholder="tu@email.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Grado</label>
                            <select id="grado" class="form-select bg-light" required>
                                <option value="Décimo">Décimo</option>
                                <option value="Undécimo">Undécimo</option>
                                <option value="Duodécimo">Duodécimo</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Sección</label>
                            <select id="seccion" class="form-select bg-light" required>
                                <option value="A">Sección A</option>
                                <option value="B">Sección B</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Contraseña</label>
                            <input type="password" id="password" class="form-control bg-light" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" id="register-submit-btn" class="btn btn-ima-primary w-100 py-3 mt-4 shadow">
                        <i class="fas fa-user-plus me-2"></i> Registrarme Ahora
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted mb-0">¿Ya tienes una cuenta?</p>
                    <a href="login.html" class="fw-bold text-decoration-none">Inicia Sesión aquí</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 text-center text-muted small">
        <p>© 2026 Instituto María Auxiliadora. <a href="index.html" class="text-decoration-none">Regresar a Inicio</a></p>
    </footer>

    <script src="js/config.js?v=11"></script>
    <script src="js/api.js?v=11"></script>
    <script src="js/auth.js?v=11"></script>
</body>
</html>
