<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiante - Área de Informática</title>
    <link rel="icon" type="image/png" href="IMA-Logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <!-- CDNs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=11">
</head>
<body class="bg-light">

    <header id="main-header" class="fixed-top shadow-sm">
        <div class="container py-2">
            <div class="d-flex justify-content-between align-items-center">
                <a href="index.html" class="logo-container d-flex align-items-center gap-3 text-decoration-none">
                    <img src="imagenes/logo.png" alt="Logo" width="100" class="logo-img">
                    <div class="d-none d-sm-block">
                        <span class="d-block fw-bold text-primary mb-0" style="font-size: 1.1rem; font-family: 'Poppins';">INSTITUTO MARIA AUXILIADORA</span>
                        <span class="text-secondary fw-medium" style="font-size: 0.8rem; letter-spacing: 1px;">ÁREA DE INFORMÁTICA</span>
                    </div>
                </a>

                <nav class="d-none d-lg-flex align-items-center gap-4">
                    <a href="index.html" class="nav-link fw-semibold text-dark">Inicio</a>
                    <a href="login.html" class="nav-link fw-semibold text-dark">Portal</a>
                </nav>

                <div class="d-lg-none">
                    <button id="mobile-menu-button" class="btn btn-light border-0">
                        <i class="fa-solid fa-bars fs-3"></i>
                        <svg class="d-none" viewBox="0 0 24 24"><path id="mobile-menu-icon" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu Overlay -->
        <div id="mobile-menu-overlay" class="hidden">
            <div class="p-4 d-flex justify-content-between align-items-center border-bottom">
                <img src="imagenes/logo.png" width="80" alt="Logo">
                <button id="mobile-menu-close-button" class="btn btn-light rounded-circle">
                    <i class="fa-solid fa-xmark fs-3"></i>
                </button>
            </div>
            <nav class="p-4 overflow-auto">
                <a href="index.html" class="mobile-nav-link">Inicio</a>
                <a href="login.html" class="mobile-nav-link">Portal</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5" style="margin-top: 85px;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-6">
                    <div class="card-ima p-4 p-md-5">
                        <div class="text-center mb-5">
                            <div class="bg-success-subtle d-inline-block p-4 rounded-circle mb-4">
                                <i class="fa-solid fa-user-plus text-success fs-1"></i>
                            </div>
                            <h2 class="fw-bold h3 mb-2" style="font-family: 'Poppins';">Crear Cuenta</h2>
                            <p class="text-muted">Únete a nuestra plataforma académica</p>
                        </div>

                        <form id="register-form">
                            <div class="row g-4">
                                <div class="col-md-12">
                                    <label for="nombre" class="form-label fw-bold text-secondary small text-uppercase">Nombre Completo</label>
                                    <input type="text" id="nombre" class="form-control form-control-lg bg-light" placeholder="Juan Pérez" required>
                                </div>
                                <div class="col-md-12">
                                    <label for="email" class="form-label fw-bold text-secondary small text-uppercase">Correo Electrónico</label>
                                    <input type="email" id="email" class="form-control form-control-lg bg-light" placeholder="juan@ejemplo.com" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="grado" class="form-label fw-bold text-secondary small text-uppercase">Grado</label>
                                    <select id="grado" name="grado" class="form-select form-select-lg bg-light" required>
                                        <option value="Décimo">Décimo</option>
                                        <option value="Undécimo">Undécimo</option>
                                        <option value="Duodécimo">Duodécimo</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="seccion" class="form-label fw-bold text-secondary small text-uppercase">Sección</label>
                                    <select id="seccion" class="form-select form-select-lg bg-light">
                                        <option value=""></option>
                                        <option value="A">A</option>
                                        <option value="B">B</option>
                                        <option value="C">C</option>
                                    </select>
                                </div>
                                <div class="col-md-12">
                                    <label for="password" class="form-label fw-bold text-secondary small text-uppercase">Contraseña</label>
                                    <input type="password" id="password" class="form-control form-control-lg bg-light" placeholder="Mínimo 8 caracteres" required>
                                </div>
                            </div>

                            <button type="submit" id="register-submit-btn" class="btn btn-ima-primary w-100 py-3 fs-5 rounded-3 mt-5 shadow-sm">
                                Registrarse Ahora
                            </button>
                        </form>

                        <div class="text-center border-top mt-5 pt-4">
                            <p class="text-muted mb-0">¿Ya tienes una cuenta?</p>
                            <a href="login.html" class="fw-bold text-primary text-decoration-none">Inicia Sesión aquí</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 mt-auto">
        <div class="container text-center">
            <p class="text-white-50 mb-0">Área de Informática &copy; <span id="current-year"></span> Instituto María Auxiliadora</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ui-common.js?v=11"></script>
    <script src="js/data.js?v=11"></script>
    <script src="js/config.js?v=11"></script>
    <script src="js/api.js?v=11"></script>
    <script src="js/auth.js?v=11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.setupCommonUI) window.setupCommonUI();
            if (window.renderCommonNav) window.renderCommonNav();
        });
    </script>
</body>
</html>
