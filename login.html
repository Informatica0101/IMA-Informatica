<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceder al Portal - Informatica IMA</title>

    <link rel="icon" type="image/png" href="IMA-Logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=11">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

    <div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="card-ima p-0 overflow-hidden" style="max-width: 450px; width: 100%;">
            <div class="p-4 bg-primary text-center text-white">
                <img src="IMA-Logo.png" alt="IMA Logo" style="height: 60px;" class="mb-3 p-1 bg-white rounded-circle shadow">
                <h4 class="fw-bold mb-0">Portal Estudiantil</h4>
                <p class="small opacity-75 mb-0">Ingresa tus credenciales para continuar</p>
            </div>

            <div class="p-4 p-md-5">
                <form id="login-form">
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Correo o Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="text" id="email" name="email" class="form-control border-start-0 bg-light" placeholder="tu@email.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" id="password" name="password" class="form-control border-start-0 bg-light" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label small" for="remember">Recordarme</label>
                        </div>
                        <a href="#" class="small text-decoration-none">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" id="login-btn" class="btn btn-ima-primary w-100 py-3 shadow">
                        <i class="fas fa-sign-in-alt me-2"></i> Entrar al Portal
                    </button>
                </form>

                <div class="text-center mt-5">
                    <p class="small text-muted mb-0">¿No tienes una cuenta?</p>
                    <a href="register.html" class="fw-bold text-decoration-none">Regístrate aquí</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 text-center text-muted small">
        <p>© 2026 Instituto María Auxiliadora. <a href="index.html" class="text-decoration-none">Regresar a Inicio</a></p>
    </footer>

    <script src="js/config.js?v=11"></script>
    <script src="js/api.js?v=11"></script>
    <script src="js/auth.js?v=11"></script>
</body>
</html>
